# Nginx 生产环境配置（阿里云SSL证书）
# 安装位置: /etc/nginx/conf.d/magnesium.conf

# HTTP 强制跳转 HTTPS
server {
    listen 80;
    server_name www.zhibanhome.com zhibanhome.com 47.100.212.79;
    return 301 https://$server_name$request_uri;
}

# HTTPS 主服务
server {
    listen 443 ssl http2;
    server_name www.zhibanhome.com zhibanhome.com;

    # 阿里云SSL证书路径（请替换为实际路径）
    ssl_certificate /path/to/your_aliyun_cert.pem;
    ssl_certificate_key /path/to/your_aliyun_cert.key;

    # SSL优化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 文件上传大小限制
    client_max_body_size 50M;

    # 静态文件
    location /static/ {
        alias /home/magnesium/magnesium_order_platform/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 媒体文件
    location /media/ {
        alias /home/magnesium/magnesium_order_platform/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # 反向代理到 Gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 安全响应头
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
}
