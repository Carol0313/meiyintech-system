# Nginx 配置文件
# 使用方法：
# 1. sudo cp deploy/nginx.conf /etc/nginx/sites-available/magnesium
# 2. sudo ln -s /etc/nginx/sites-available/magnesium /etc/nginx/sites-enabled/
# 3. sudo nginx -t
# 4. sudo systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;  # 修改为你的域名或服务器IP

    # 日志
    access_log /var/log/nginx/magnesium_access.log;
    error_log /var/log/nginx/magnesium_error.log;

    # 客户端上传文件大小限制（最大50MB，与Django配置一致）
    client_max_body_size 50M;

    # 静态文件
    location /static/ {
        alias /home/magnesium/magnesium_order_platform/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 媒体文件（用户上传的文件）
    location /media/ {
        alias /home/magnesium/magnesium_order_platform/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # 反向代理到 Gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
