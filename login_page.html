<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 闪电制版</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root {
            --sidebar-width: 220px;
            --sidebar-bg: #1976D2;
            --sidebar-bg-hover: rgba(255,255,255,0.1);
            --sidebar-bg-active: rgba(255,255,255,0.15);
            --sidebar-text: rgba(255,255,255,0.85);
            --sidebar-text-active: #fff;

            --primary: #1976D2;
            --primary-hover: #1565C0;
            --primary-light: #E3F2FD;
            --primary-dark: #0D47A1;

            --bg-main: #f0f2f5;
            --bg-card: #ffffff;
            --bg-header: #ffffff;

            --text-main: #1a1a1a;
            --text-secondary: #333333;
            --text-muted: #666666;
            --text-placeholder: #999999;

            --border-color: #e8e8e8;
            --border-input: #d9d9d9;
            --border-table: #f0f0f0;

            --radius-sm: 4px;
            --radius-md: 6px;
            --radius-lg: 8px;

            --green: #43A047;
            --green-hover: #388E3C;
            --red: #E53935;
            --red-hover: #D32F2F;
            --orange: #FB8C00;
            --orange-hover: #F57C00;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            font-size: 14px;
            line-height: 1.5;
            margin: 0;
        }

        /* ===== Sidebar ===== */
        .sidebar {
            width: var(--sidebar-width);
            min-height: 100vh;
            background: var(--sidebar-bg);
            position: fixed;
            top: 0; left: 0; z-index: 1000;
            display: flex;
            flex-direction: column;
            color: var(--sidebar-text);
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px 20px;
            height: 56px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-brand-logo {
            width: 32px; height: 32px;
            object-fit: contain;
            border-radius: var(--radius-sm);
            filter: brightness(0) invert(1);
        }

        .sidebar-brand-text {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0;
        }

        .nav-section {
            font-size: 12px;
            font-weight: 500;
            color: rgba(255,255,255,0.5);
            padding: 16px 20px 8px;
            text-transform: none;
            letter-spacing: 0;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            margin: 2px 12px;
            border-radius: var(--radius-sm);
            color: var(--sidebar-text);
            font-weight: 400;
            font-size: 14px;
            text-decoration: none;
            transition: background 0.15s ease;
            position: relative;
        }

        .nav-link:hover {
            background: var(--sidebar-bg-hover);
            color: #fff;
        }

        .nav-link.active {
            background: var(--sidebar-bg-active);
            color: var(--sidebar-text-active);
            font-weight: 500;
        }

        .nav-link.active::before {
            content: '';
            position: absolute;
            left: -12px; top: 4px; bottom: 4px;
            width: 3px;
            background: #fff;
            border-radius: 0 2px 2px 0;
        }

        .nav-link i {
            width: 18px;
            text-align: center;
            font-size: 15px;
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 12px 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .user-pill {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.15);
            border-radius: var(--radius-md);
        }

        .user-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
        }

        /* ===== Main Content ===== */
        .main-content {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            padding: 0;
            background: var(--bg-main);
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            height: 56px;
        }

        .page-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: 0;
        }

        .page-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .content-body {
            padding: 20px 24px;
        }

        /* ===== Cards ===== */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            box-shadow: none;
        }

        .card-header {
            background: transparent;
            border-bottom: 1px solid var(--border-color);
            padding: 14px 20px;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-main);
        }

        .card-body {
            padding: 20px;
        }

        .card-footer {
            background: transparent;
            border-top: 1px solid var(--border-color);
            padding: 14px 20px;
        }

        /* ===== Stat Cards ===== */
        .stat-card {
            padding: 20px;
            position: relative;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 400;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: 0;
            line-height: 1.2;
        }

        .stat-icon {
            position: absolute;
            top: 16px; right: 16px;
            width: 40px; height: 40px;
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }

        .stat-icon.primary { background: var(--primary-light); color: var(--primary); }
        .stat-icon.info    { background: #FFF3E0; color: var(--orange); }
        .stat-icon.warning { background: #E3F2FD; color: var(--primary); }
        .stat-icon.success { background: #E8F5E9; color: var(--green); }

        /* ===== Buttons ===== */
        .btn {
            font-weight: 400;
            border-radius: var(--radius-sm);
            padding: 0.4rem 0.9rem;
            font-size: 14px;
            transition: background 0.15s ease, border-color 0.15s ease;
        }

        .btn-primary {
            background: var(--primary);
            border: 1px solid var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            border-color: var(--primary-hover);
            color: #fff;
        }

        .btn-outline-primary {
            color: var(--primary);
            border-color: var(--primary);
            background: transparent;
        }

        .btn-outline-primary:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        .btn-success {
            background: var(--green);
            border: 1px solid var(--green);
            color: #fff;
        }

        .btn-success:hover {
            background: var(--green-hover);
            border-color: var(--green-hover);
            color: #fff;
        }

        .btn-danger {
            background: var(--red);
            border: 1px solid var(--red);
            color: #fff;
        }

        .btn-danger:hover {
            background: var(--red-hover);
            border-color: var(--red-hover);
            color: #fff;
        }

        .btn-warning {
            background: var(--orange);
            border: 1px solid var(--orange);
            color: #fff;
        }

        .btn-warning:hover {
            background: var(--orange-hover);
            border-color: var(--orange-hover);
            color: #fff;
        }

        .btn-outline-secondary {
            color: var(--text-muted);
            border-color: var(--border-input);
        }

        .btn-outline-secondary:hover {
            background: #f5f5f5;
            border-color: var(--border-input);
            color: var(--text-main);
        }

        .btn-sm {
            padding: 0.25rem 0.6rem;
            font-size: 13px;
        }

        .btn-lg {
            padding: 0.6rem 1.2rem;
            font-size: 15px;
        }

        /* ===== Tables ===== */
        .table {
            font-size: 14px;
            margin-bottom: 0;
        }

        .table thead th {
            background: #fafafa;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 13px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-table);
            border-top: none;
            letter-spacing: 0;
            text-transform: none;
        }

        .table tbody td {
            padding: 14px 16px;
            color: var(--text-main);
            vertical-align: middle;
            border-bottom: 1px solid var(--border-table);
        }

        .table tbody tr:hover td {
            background: #fafafa;
        }

        .table-sm td, .table-sm th {
            padding: 8px 12px;
            font-size: 13px;
        }

        .table-bordered {
            border: 1px solid var(--border-table);
        }

        .table-bordered td, .table-bordered th {
            border-color: var(--border-table);
        }

        /* ===== Badges & Status ===== */
        .badge {
            font-size: 12px;
            font-weight: 400;
            padding: 0.3em 0.6em;
            border-radius: var(--radius-sm);
        }

        .badge-status {
            font-size: 12px;
            font-weight: 400;
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            display: inline-block;
        }

        .status-draft           { background: #f5f5f5; color: #666; }
        .status-pending_confirm { background: #FFF3E0; color: #E65100; }
        .status-design_confirmed{ background: #E3F2FD; color: #1565C0; }
        .status-pending_payment { background: #FCE4EC; color: #C2185B; }
        .status-paid            { background: #E8F5E9; color: #2E7D32; }
        .status-in_production   { background: #E8EAF6; color: #303F9F; }
        .status-shipped         { background: #E3F2FD; color: #1565C0; }
        .status-received        { background: #E8F5E9; color: #2E7D32; }
        .status-info_error      { background: #FFEBEE; color: #C62828; }
        .status-cancelled       { background: #f5f5f5; color: #888; }

        /* ===== Forms ===== */
        .form-control, .form-select {
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-input);
            padding: 0.45rem 0.75rem;
            font-size: 14px;
            transition: border-color 0.15s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(25,118,210,0.15);
        }

        .form-label {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        /* ===== Alert / Message ===== */
        .alert {
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            font-size: 14px;
        }

        .alert-success { background: #E8F5E9; color: #2E7D32; border-color: #C8E6C9; }
        .alert-danger  { background: #FFEBEE; color: #C62828; border-color: #FFCDD2; }
        .alert-warning { background: #FFF3E0; color: #E65100; border-color: #FFE0B2; }
        .alert-info    { background: #E3F2FD; color: #1565C0; border-color: #BBDEFB; }

        /* ===== Step Indicator ===== */
        .step-indicator {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .step-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #ddd;
            transition: all 0.2s;
        }

        .step-dot.active {
            background: var(--primary);
            width: 20px;
            border-radius: 3px;
        }

        /* ===== Modal ===== */
        .modal-content {
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }

        .modal-header {
            border-bottom: 1px solid var(--border-color);
            padding: 14px 20px;
        }

        .modal-footer {
            border-top: 1px solid var(--border-color);
            padding: 12px 20px;
        }

        /* ===== Pagination / Nav ===== */
        .pagination .page-link {
            color: var(--primary);
            border-color: var(--border-color);
            font-size: 14px;
        }

        .pagination .page-item.active .page-link {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* ===== Misc ===== */
        a { color: var(--primary); text-decoration: none; }
        a:hover { color: var(--primary-hover); text-decoration: none; }

        .dropdown-menu {
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            font-size: 14px;
        }

        .dropdown-item { padding: 8px 16px; font-size: 14px; }
        .dropdown-item:hover { background: #f5f5f5; }

        hr { border-color: var(--border-color); opacity: 1; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); transition: transform .25s ease; }
            .sidebar.show { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .content-body { padding: 16px; }
        }
    </style>

    .login-btn:hover {

    .login-links {

    .login-links a {

    }

    .login-links a:hover {

    }

    .login-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 24px 0 18px;
        color: var(--text-muted);
        font-size: 13px;
    }

    .login-divider::before,
    .login-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border-color);
    }

    .login-register {
        text-align: center;
        font-size: 13px;
        color: var(--text-muted);
    }

    .login-register a {
        color: var(--primary);
        font-weight: 500;
        text-decoration: none;
        margin: 0 4px;
    }

    .login-register a:hover {
        color: var(--primary-hover);
        text-decoration: underline;
    }

    @media (max-width: 576px) {
        .login-card-body { padding: 28px 24px 24px; }
    }
</style>
