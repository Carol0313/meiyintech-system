{% extends 'base.html' %}
{% block title %}特殊要求 - 下单{% endblock %}
{% block page_title %}步骤5：特殊要求{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">额外要求 / 备注</label>
                        <textarea name="special_requests" class="form-control" rows="4" placeholder="请输入给商家的额外要求..."></textarea>
                        {% if last_note %}
                        <div class="mt-2">
                            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="document.querySelector('textarea').value=`{{ last_note|escapejs }}`">一键带入上次备注</button>
                        </div>
                        {% endif %}
                    </div>
                    <div class="mb-3">
                        <label class="form-label d-block">预定义选项（多选）</label>
                        {% for val, label in preset_options %}
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" name="preset_options" value="{{ val }}" id="opt_{{ val }}">
                            <label class="form-check-label" for="opt_{{ val }}">{{ label }}</label>
                        </div>
                        {% endfor %}
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">下一步：选择交货时间</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
