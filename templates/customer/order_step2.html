{% extends 'base.html' %}
{% block title %}上传文件 - 下单{% endblock %}
{% block page_title %}步骤2：文件上传{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">上传PDF文件</label>
                        <input type="file" name="pdf_file" class="form-control" accept=".pdf">
                        <div class="form-text">支持PDF格式，建议文件大小不超过50MB</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label d-block">文件类型 <span class="text-danger">*</span></label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="file_type" id="fileStandard" value="standard">
                            <label class="form-check-label" for="fileStandard">文件已转曲/矢量化</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="file_type" id="fileProcessed" value="processed" checked>
                            <label class="form-check-label" for="fileProcessed">需要处理文件</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="file_type" id="fileImage" value="image">
                            <label class="form-check-label" for="fileImage">文件是图片文件</label>
                        </div>
                    </div>
                    <div class="mt-4 d-grid">
                        <button type="submit" class="btn btn-primary">下一步</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
