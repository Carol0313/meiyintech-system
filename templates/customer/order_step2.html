{% extends 'base.html' %}
{% block title %}上传文件 - 下单{% endblock %}
{% block page_title %}步骤2：文件上传{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">上传PDF文件</label>
                        <input type="file" name="pdf_file" class="form-control" accept=".pdf">
                        <div class="form-text">支持PDF格式，建议文件大小不超过50MB</div>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="file_standard_checked" class="form-check-input" id="standardCheck">
                        <label class="form-check-label" for="standardCheck">我的文件是否符合标准（转曲/矢量）</label>
                    </div>
                    <div class="mb-3">
                        <label class="form-label d-block">文件处理选项</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="file_processed" id="noProcess" value="" checked>
                            <label class="form-check-label" for="noProcess">不处理，直接下一步</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="file_processed" id="doProcess" value="on">
                            <label class="form-check-label" for="doProcess">处理（进入面积计算与预览）</label>
                        </div>
                    </div>
                    <div class="mt-4 d-grid">
                        <button type="submit" class="btn btn-primary">下一步</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
