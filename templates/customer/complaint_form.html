{% extends 'base.html' %}
{% block title %}提交投诉 - 订单 {{ order.sn }}{% endblock %}
{% block page_title %}提交投诉{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card mb-3">
            <div class="card-header">
                <i class="bi bi-shield-exclamation text-danger"></i> 订单投诉
            </div>
            <div class="card-body">
                <div class="alert alert-light border mb-3">
                    <div class="small text-muted">订单号：{{ order.sn }}</div>
                    <div class="small text-muted">下单时间：{{ order.created_at|date:"Y-m-d H:i" }}</div>
                </div>

                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">投诉类型</label>
                        <select name="complaint_type" class="form-select">
                            <option value="quality">质量问题（成品与文件不符）</option>
                            <option value="damage">运输损坏</option>
                            <option value="delay">发货延迟</option>
                            <option value="wrong">发错货物</option>
                            <option value="other">其他问题</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">投诉描述 <span class="text-danger">*</span></label>
                        <textarea name="description" class="form-control" rows="5" placeholder="请详细描述您遇到的问题..." required></textarea>
                        <div class="form-text">请尽可能详细地描述问题，以便商家快速处理</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">上传图片（可选，最多3张，每张不超过2MB）</label>
                        <div class="row g-2">
                            <div class="col-md-4">
                                <input type="file" name="image1" class="form-control" accept="image/*" onchange="previewImage(this, 'preview1')">
                                <div id="preview1" class="mt-2"></div>
                            </div>
                            <div class="col-md-4">
                                <input type="file" name="image2" class="form-control" accept="image/*" onchange="previewImage(this, 'preview2')">
                                <div id="preview2" class="mt-2"></div>
                            </div>
                            <div class="col-md-4">
                                <input type="file" name="image3" class="form-control" accept="image/*" onchange="previewImage(this, 'preview3')">
                                <div id="preview3" class="mt-2"></div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-send"></i> 提交投诉
                        </button>
                        <a href="{% url 'order_detail' order.id %}" class="btn btn-outline-secondary">返回订单</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
function previewImage(input, previewId) {
    const preview = document.getElementById(previewId);
    preview.innerHTML = '';
    if (input.files && input.files[0]) {
        // 检查文件大小
        if (input.files[0].size > 2 * 1024 * 1024) {
            alert('图片大小不能超过2MB');
            input.value = '';
            return;
        }
        const reader = new FileReader();
        reader.onload = function(e) {
            preview.innerHTML = '<img src="' + e.target.result + '" class="img-fluid rounded border" style="max-height:100px;">';
        }
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
{% endblock %}
