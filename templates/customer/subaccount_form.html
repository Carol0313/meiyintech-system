{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% if sub_profile %}
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <input type="text" class="form-control" value="{{ sub_profile.user.username }}" disabled>
            </div>
            <div class="mb-3">
                <label class="form-label">手机号</label>
                <input type="text" class="form-control" value="{{ sub_profile.user.phone }}" disabled>
            </div>
            <div class="mb-3">
                <label class="form-label">真实姓名</label>
                <input type="text" name="real_name" class="form-control" value="{{ sub_profile.real_name|default:'' }}">
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" name="is_active" class="form-check-input" id="isActive" {% if sub_profile.user.is_active %}checked{% endif %}>
                <label class="form-check-label" for="isActive">启用</label>
            </div>
            {% else %}
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">手机号</label>
                <input type="text" name="phone" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">密码</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">真实姓名</label>
                <input type="text" name="real_name" class="form-control">
            </div>
            {% endif %}
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">保存</button>
                <a href="{% url 'customer_subaccount_list' %}" class="btn btn-outline-secondary">返回</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
