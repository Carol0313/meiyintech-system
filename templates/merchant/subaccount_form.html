{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% if not staff %}
                    <div class="mb-3"><label class="form-label">登录用户名</label><input type="text" name="username" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">手机号</label><input type="text" name="phone" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">密码</label><input type="password" name="password" class="form-control" required></div>
                    {% endif %}
                    <div class="mb-3">
                        <label class="form-label">岗位角色</label>
                        <select name="role_id" class="form-select">
                            <option value="">- 请选择 -</option>
                            {% for r in roles %}<option value="{{ r.id }}" {% if staff and staff.role_id == r.id %}selected{% endif %}>{{ r.get_name_display }}</option>{% endfor %}
                        </select>
                    </div>
                    {% if staff %}
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="is_active" class="form-check-input" id="isActive" {% if staff.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="isActive">账号启用</label>
                    </div>
                    {% endif %}
                    <button type="submit" class="btn btn-primary">保存</button>
                    <a href="{% url 'subaccount_list' %}" class="btn btn-outline-secondary">返回</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
