{% extends 'base.html' %}
{% load static %}
{% block title %}登录 - 闪电制版{% endblock %}
{% block page_title %}{% endblock %}
{% block page_subtitle %}{% endblock %}

{% block extra_css %}
<style>
    .sidebar { display: none !important; }
    .main-content { margin-left: 0 !important; padding: 0 !important; }
    .topbar { display: none !important; }

    .login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-main) url('{% static 'images/login-bg.jpg' %}') no-repeat center center;
        background-size: cover;
        padding: 40px 20px;
        position: relative;
    }

    .login-page::before {
        content: '';
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.35);
        z-index: 0;
    }

    .login-card {
        width: 100%;
        max-width: 420px;
        background: rgba(255,255,255,0.92);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.3);
        border-radius: var(--radius-md);
        position: relative;
        z-index: 1;
        box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    .login-card-header {
        height: 4px;
        background: var(--primary);
    }

    .login-card-body {
        padding: 36px 36px 32px;
    }

    .login-brand {
        text-align: center;
        margin-bottom: 28px;
    }

    .login-brand-icon {
        width: 56px;
        height: 56px;
        margin: 0 auto 12px;
        border-radius: var(--radius-md);
        background: var(--primary);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 28px;
    }

    .login-brand-title {
        font-size: 20px;
        font-weight: 600;
        color: var(--text-main);
        margin-bottom: 4px;
    }

    .login-brand-subtitle {
        font-size: 14px;
        color: var(--text-muted);
    }

    .login-form .form-group {
        margin-bottom: 18px;
    }

    .login-form .form-label {
        font-size: 14px;
        font-weight: 400;
        color: var(--text-secondary);
        margin-bottom: 6px;
        display: block;
    }

    .login-form .form-control {
        border-radius: var(--radius-sm);
        border: 1px solid var(--border-input);
        padding: 0.65rem 0.9rem;
        font-size: 15px;
        background: #fff;
    }

    .login-form .form-control:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(25,118,210,0.15);
    }

    .login-btn {
        width: 100%;
        padding: 0.7rem;
        border-radius: var(--radius-sm);
        font-size: 15px;
        font-weight: 500;
        border: none;
        background: var(--primary);
        color: white;
        cursor: pointer;
        margin-top: 4px;
    }

    .login-btn:hover {
        background: var(--primary-hover);
    }

    .login-links {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 16px;
        font-size: 13px;
    }

    .login-links a {
        color: var(--text-muted);
        text-decoration: none;
    }

    .login-links a:hover {
        color: var(--primary);
    }

    .login-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 24px 0 18px;
        color: var(--text-muted);
        font-size: 13px;
    }

    .login-divider::before,
    .login-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border-color);
    }

    .login-register {
        text-align: center;
        font-size: 13px;
        color: var(--text-muted);
    }

    .login-register a {
        color: var(--primary);
        font-weight: 500;
        text-decoration: none;
        margin: 0 4px;
    }

    .login-register a:hover {
        color: var(--primary-hover);
        text-decoration: underline;
    }

    @media (max-width: 576px) {
        .login-card-body { padding: 28px 24px 24px; }
    }
</style>
{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-card">
        <div class="login-card-header"></div>
        <div class="login-card-body">
            <div class="login-brand">
                <div class="login-brand-icon">
                    <i class="bi bi-lightning-charge-fill"></i>
                </div>
                <div class="login-brand-title">闪电制版</div>
                <div class="login-brand-subtitle">千厂资源一键触达，制版从未如此简单</div>
            </div>

            <form method="post" novalidate class="login-form">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label" for="id_username">手机号</label>
                    <input type="text" name="username" id="id_username" class="form-control" placeholder="请输入手机号" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="id_password">密码</label>
                    <input type="password" name="password" id="id_password" class="form-control" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="login-btn">登录</button>
            </form>

            <div class="login-links">
                <a href="{% url 'forget_password' %}">忘记密码？</a>
            </div>

            <div class="login-divider">还没有账号</div>
            <div class="login-register">
                <a href="{% url 'customer_register' %}">免费注册下单</a>
                <span style="color:var(--border-color);">|</span>
                <a href="{% url 'merchant_register' %}">商家入驻</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
