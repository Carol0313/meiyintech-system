{% extends 'base.html' %}
{% block title %}商家入驻{% endblock %}
{% block page_title %}商家入驻申请{% endblock %}
{% block page_subtitle %}申请通过后需支付100元/年开户服务费，由管理员手动审核开通{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <h6 class="fw-bold mb-3" style="color:var(--primary);">商家信息</h6>
                    <div class="mb-3">
                        <label class="form-label">商家名称 <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">商家地址</label>
                        <textarea name="address" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">服务区域</label>
                        <div id="regionSelector"></div>
                        <input type="hidden" name="service_regions" id="serviceRegionsInput" value="">
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">联系电话</label>
                            <input type="text" name="contact_phone" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">客服微信号</label>
                            <input type="text" name="customer_service_wechat" class="form-control">
                        </div>
                    </div>

                    <hr class="my-4" style="border-color:var(--border-light);">

                    <h6 class="fw-bold mb-3" style="color:var(--primary);">管理员账号</h6>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">管理员手机号 <span class="text-danger">*</span></label>
                            <input type="text" name="admin_phone" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">管理员密码 <span class="text-danger">*</span></label>
                            <input type="password" name="admin_password" class="form-control" required minlength="6">
                        </div>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">提交入驻申请</button>
                        <a href="{% url 'login' %}" class="btn btn-outline-secondary">已有账号？去登录</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="/static/js/china_regions.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    initRegionSelector('regionSelector', 'serviceRegionsInput', []);
});
</script>

<style>
.region-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    max-height: 280px;
    overflow-y: auto;
    padding: 6px;
    border: 1px solid var(--border-light);
    border-radius: 10px;
    background: #fff;
}
.region-row {
    padding: 8px 10px;
    border-radius: 8px;
    background: #f8fafc;
    border: 1px solid transparent;
    transition: all 0.15s;
}
.region-row:hover {
    border-color: var(--border-light);
}
.region-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.region-cities {
    margin-top: 6px;
    padding-top: 6px;
    padding-left: 22px;
    border-top: 1px dashed var(--border-light);
    display: none;
}
</style>
{% endblock %}
