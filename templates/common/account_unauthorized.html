{% extends "base.html" %}
{% block title %}账号状态异常{% endblock %}
{% block content %}
<div class="container py-5 text-center">
  <div class="card mx-auto" style="max-width: 480px;">
    <div class="card-body p-5">
      <h1 class="display-1 text-warning mb-3">&#9888;</h1>
      <h4 class="card-title mb-3">账号状态异常</h4>
      <p class="card-text text-muted mb-4">{{ message|default:"您当前无法访问该页面，请联系管理员处理。" }}</p>
      <a href="{% url 'login' %}" class="btn btn-primary">返回登录页</a>
      {% if can_logout %}
      <a href="{% url 'logout' %}" class="btn btn-outline-secondary ms-2">退出当前账号</a>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
