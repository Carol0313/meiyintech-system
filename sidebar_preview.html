<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>侧边栏预览 - 闪电制版</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        /* ========== 新设计：商务深蓝 sidebar ========== */
        :root {
            --sidebar-width: 220px;
            --sidebar-bg: #0f1d32;
            --sidebar-bg-hover: rgba(255,255,255,0.06);
            --sidebar-bg-active: #1a3a5c;
            --sidebar-text: #94a3b8;
            --sidebar-text-active: #ffffff;
            --sidebar-border: rgba(255,255,255,0.06);
            --accent: #e8b341;
        }

        * { box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", -apple-system, sans-serif;
            background: #f5f6f8;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            min-height: 100vh;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            color: var(--sidebar-text);
            position: fixed;
            left: 0; top: 0; bottom: 0;
        }

        /* Logo区域 */
        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px;
            border-bottom: 1px solid var(--sidebar-border);
        }
        .sidebar-brand-logo {
            width: 36px; height: 36px;
            background: var(--accent);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #0f1d32;
            font-size: 20px;
            font-weight: bold;
        }
        .sidebar-brand-text {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 1px;
        }

        /* 导航分组标题 */
        .nav-section {
            font-size: 11px;
            font-weight: 500;
            color: #64748b;
            padding: 20px 20px 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 导航链接 */
        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            margin: 2px 12px;
            border-radius: 6px;
            color: var(--sidebar-text);
            font-size: 14px;
            text-decoration: none;
            transition: all 0.2s ease;
            position: relative;
        }
        .nav-link:hover {
            background: var(--sidebar-bg-hover);
            color: #fff;
        }
        .nav-link.active {
            background: var(--sidebar-bg-active);
            color: var(--sidebar-text-active);
            font-weight: 500;
        }
        /* 激活状态的左侧金色竖条 */
        .nav-link.active::before {
            content: '';
            position: absolute;
            left: -12px; top: 6px; bottom: 6px;
            width: 3px;
            background: var(--accent);
            border-radius: 0 2px 2px 0;
        }
        .nav-link i {
            width: 20px;
            text-align: center;
            font-size: 16px;
        }

        /* 底部用户信息 */
        .sidebar-footer {
            margin-top: auto;
            padding: 16px;
            border-top: 1px solid var(--sidebar-border);
        }
        .user-pill {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: rgba(255,255,255,0.04);
            border-radius: 8px;
            border: 1px solid var(--sidebar-border);
        }
        .user-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: var(--accent);
            display: flex; align-items: center; justify-content: center;
            color: #0f1d32;
            font-size: 13px;
            font-weight: 600;
        }
        .user-name {
            color: #fff;
            font-size: 13px;
            font-weight: 500;
        }
        .user-role {
            color: #64748b;
            font-size: 11px;
        }

        /* 右侧内容区（预览用） */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 40px;
        }
        .preview-title {
            font-size: 24px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
        }
        .preview-desc {
            color: #64748b;
            margin-bottom: 32px;
        }
        .color-palette {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }
        .color-block {
            width: 80px; height: 80px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: #fff;
            font-weight: 500;
        }
        .color-block.dark { background: #0f1d32; }
        .color-block.active { background: #1a3a5c; }
        .color-block.accent { background: #e8b341; color: #0f1d32; }
        .color-block.text { background: #94a3b8; }

        /* 按钮预览 */
        .btn-preview-section {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #e2e8f0;
        }
        .btn-preview-section h5 {
            margin-bottom: 16px;
            color: #1e293b;
        }
        .btn-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        /* 新按钮样式：纯色无渐变 */
        .btn-solid-primary {
            background: #1565c0;
            border: none;
            color: #fff;
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-solid-primary:hover {
            background: #0d47a1;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(21,101,192,0.3);
        }

        .btn-solid-success {
            background: #2e7d32;
            border: none;
            color: #fff;
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-solid-success:hover {
            background: #1b5e20;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(46,125,50,0.3);
        }

        .btn-solid-danger {
            background: #c62828;
            border: none;
            color: #fff;
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-solid-danger:hover {
            background: #b71c1c;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(198,40,40,0.3);
        }

        .btn-outline-primary-solid {
            background: #fff;
            border: 1.5px solid #1565c0;
            color: #1565c0;
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-outline-primary-solid:hover {
            background: #1565c0;
            color: #fff;
        }

        .btn-outline-danger-solid {
            background: #fff;
            border: 1.5px solid #c62828;
            color: #c62828;
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-outline-danger-solid:hover {
            background: #c62828;
            color: #fff;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-brand-logo">
                <i class="bi bi-lightning-charge-fill"></i>
            </div>
            <div class="sidebar-brand-text">闪电制版</div>
        </div>

        <div class="flex-grow-1" style="overflow-y:auto;">
            <div class="nav-section">管理中心</div>
            <a class="nav-link" href="#"><i class="bi bi-speedometer2"></i> 管理中心</a>
            <a class="nav-link" href="#"><i class="bi bi-people"></i> 会员管理</a>
            <a class="nav-link" href="#"><i class="bi bi-building"></i> 工厂管理</a>
            <a class="nav-link" href="#"><i class="bi bi-box-seam"></i> 商品规格</a>
            <a class="nav-link active" href="#"><i class="bi bi-journal-text"></i> 订单管理</a>
            <a class="nav-link" href="#"><i class="bi bi-file-earmark-arrow-up"></i> 待上传制版</a>
            <a class="nav-link" href="#"><i class="bi bi-grid-3x3-gap"></i> 待拼版</a>
            <a class="nav-link" href="#"><i class="bi bi-gear-wide-connected"></i> 生产看板</a>

            <div class="nav-section">系统设置</div>
            <a class="nav-link" href="#"><i class="bi bi-shield-lock"></i> 岗位权限</a>
            <a class="nav-link" href="#"><i class="bi bi-person-badge"></i> 子账号</a>
            <a class="nav-link" href="#"><i class="bi bi-gear"></i> 账号设置</a>
        </div>

        <div class="sidebar-footer">
            <div class="user-pill">
                <div class="user-avatar">M</div>
                <div>
                    <div class="user-name">merchant_ad...</div>
                    <div class="user-role">商家管理员</div>
                </div>
                <a href="#" style="color:#64748b;margin-left:auto;"><i class="bi bi-box-arrow-right"></i></a>
            </div>
        </div>
    </nav>

    <!-- 右侧预览内容 -->
    <div class="main-content">
        <div class="preview-title">侧边栏 redesign 预览</div>
        <div class="preview-desc">
            去AI味设计：深色商务蓝底色 + 金色点缀 + 纯色按钮<br>
            更稳重、更专业、更像传统工业软件
        </div>

        <div class="color-palette">
            <div class="color-block dark">
                <span>#0f1d32</span>
                <span style="font-size:10px;margin-top:4px;">底色</span>
            </div>
            <div class="color-block active">
                <span>#1a3a5c</span>
                <span style="font-size:10px;margin-top:4px;">激活</span>
            </div>
            <div class="color-block accent">
                <span>#e8b341</span>
                <span style="font-size:10px;margin-top:4px;">点缀</span>
            </div>
            <div class="color-block text">
                <span>#94a3b8</span>
                <span style="font-size:10px;margin-top:4px;">文字</span>
            </div>
        </div>

        <div class="btn-preview-section">
            <h5><i class="bi bi-palette"></i> 按钮样式（纯色无渐变）</h5>
            <div class="btn-row">
                <button class="btn-solid-primary">主按钮</button>
                <button class="btn-solid-success">确认</button>
                <button class="btn-solid-danger">删除</button>
            </div>
            <div class="btn-row">
                <button class="btn-outline-primary-solid">边框主色</button>
                <button class="btn-outline-danger-solid">边框危险</button>
            </div>
        </div>
    </div>
</body>
</html>
